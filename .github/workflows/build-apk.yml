name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Install TypeScript
        run: npm install -D typescript

      - name: Build web assets
        run: CAPACITOR=true npx vite build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon -q

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk safarnama.apk

      - name: Delete old latest release
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old latest tag
        run: git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Safarnama — Latest Build
          body: |
            ## Install Safarnama on Android

            1. Download `safarnama.apk` below
            2. On your phone: Settings → Security → enable **Install from unknown sources**
            3. Open the downloaded APK and tap Install

            **Install on iPhone:** https://neha-rani-r.github.io/safarnama/install.html

            ---
            Built automatically from latest code
          files: safarnama.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
