name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Install TypeScript (required by Capacitor)
        run: npm install -D typescript

      - name: Build web assets (mobile base path)
        run: CAPACITOR=true npx vite build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build release APK (unsigned)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: safarnama-debug-${{ steps.sha.outputs.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: safarnama-release-unsigned-${{ steps.sha.outputs.sha }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.sha.outputs.sha }}
          name: Safarnama v${{ steps.version.outputs.version }} (${{ steps.sha.outputs.sha }})
          body: |
            ## Safarnama APK

            **Debug APK** — install directly for testing (no keystore needed).
            **Release APK (unsigned)** — requires signing before distribution on Play Store.

            ### Install on Android
            1. Download `app-debug.apk`
            2. Enable *Install from unknown sources* in Settings → Security
            3. Open the downloaded APK to install

            Built from commit `${{ steps.sha.outputs.sha }}`
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
